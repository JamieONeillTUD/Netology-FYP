[pytest]
# Add the backend directory to sys.path so tests can import xp_system, auth_routes, etc.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Code coverage — run with: pytest --cov (requires pytest-cov to be installed)

markers =
    integration: Real DB integration tests (require Docker via testcontainers)
    api: Full API tests — Flask routes + real PostgreSQL (require Docker via testcontainers)
